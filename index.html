<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Micro+5&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <title>PixiePanic</title>
  </head>
  <body>
    <!-- Start Screen -->
    <section id="screen-start" class="screen active">
      <div class="panel">
        <h1>PixiePanic</h1>
        <p>Navigate the maze and place bombs!</p>
        <button id="btn-start">Start Game</button>
      </div>
    </section>

    <!-- Game Screen -->
    <section id="screen-game" class="screen">
      <div class="game-layout">

        <!-- Top bar: general info -->
        <div class="hud-top">
          <span class="hud-game-title">PixiePanic</span>
          <span class="hud-timer" id="hud-timer">0:00</span>
        </div>

        <!-- Middle row: P1 panel | canvas | P2 panel -->
        <div class="hud-middle">

          <!-- P1 panel (left) -->
          <div class="hud-side hud-side--left">
            <span class="hud-player-label">P1</span>
            <div class="player-portrait player-portrait--p1">
              <img src="assets/purple-pixie.png" alt="P1" id="portrait-p1" />
            </div>
            <span class="hud-control-hint">WASD + Q</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">LIVES</span>
            <span class="hud-hearts" id="hud-p1-hearts">H H H</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">BOMBS</span>
            <span class="hud-bombs" id="hud-p1-bombs">* . .</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">COOLDOWN</span>
            <span class="hud-cd ready" id="hud-p1-cd">READY</span>
          </div>

          <canvas id="game-canvas"></canvas>

          <!-- P2 panel (right) -->
          <div class="hud-side hud-side--right">
            <span class="hud-player-label">P2</span>
            <div class="player-portrait player-portrait--p2">
              <img src="assets/green-pixie.png" alt="P2" id="portrait-p2" />
            </div>
            <span class="hud-control-hint">ARROWS + SPC</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">LIVES</span>
            <span class="hud-hearts" id="hud-p2-hearts">H H H</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">BOMBS</span>
            <span class="hud-bombs" id="hud-p2-bombs">* . .</span>
            <div class="hud-divider"></div>
            <span class="hud-stat-label">COOLDOWN</span>
            <span class="hud-cd ready" id="hud-p2-cd">READY</span>
          </div>

        </div>

        <!-- Bottom bar: symmetry / branding -->
        <div class="hud-bottom">
          <span class="hud-bottom-text">* pixie panic *</span>
        </div>

      </div>
    </section>

    <!-- Game Over Screen -->
    <section id="screen-gameover" class="screen">
      <div class="panel">
        <h1 id="gameover-title">Game Over</h1>
        <p id="gameover-message">Better luck next time!</p>
        <button id="btn-restart">Play Again</button>
      </div>
    </section>

    <script src="src/constants.js"></script>
    <script src="src/state.js"></script>
    <script src="src/maze.js"></script>
    <script src="src/player.js"></script>
    <script src="src/bombs.js"></script>
    <script src="src/powerups.js"></script>
    <script src="src/hud.js"></script>
    <script src="src/screens.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
